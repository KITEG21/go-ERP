definitions:
  attendance.Attendance:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      date:
        type: string
      id:
        type: integer
      status:
        $ref: '#/definitions/attendance.AttendanceState'
      worker:
        $ref: '#/definitions/workers.Worker'
      worker_id:
        type: integer
    type: object
  attendance.AttendanceState:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - CheckedIn
    - CheckedOut
    - Expired
  auth.LoginDto:
    properties:
      email:
        example: user@example.com
        format: email
        type: string
      password:
        minLength: 6
        type: string
    required:
    - password
    type: object
  auth.RegisterDto:
    properties:
      email:
        example: user@example.com
        format: email
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        minLength: 6
        type: string
    required:
    - name
    - password
    type: object
  common.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  departments.Department:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dtos.CreateAttendanceDto:
    properties:
      check_in:
        type: string
      check_out:
        type: string
      date:
        type: string
      worker_id:
        type: integer
    required:
    - check_in
    - check_out
    - date
    - worker_id
    type: object
  dtos.CreateDepartmentDto:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dtos.CreatePayrollDto:
    properties:
      base_salary:
        type: number
      bonus:
        minimum: 0
        type: number
      deductions:
        type: number
      month:
        type: string
      worker_id:
        type: integer
    required:
    - base_salary
    - month
    - worker_id
    type: object
  dtos.CreateWorkerDto:
    properties:
      department_id:
        type: integer
      email:
        type: string
      hire_date:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - email
    - name
    type: object
  dtos.UpdateAttendanceDto:
    properties:
      check_out:
        type: string
      id:
        type: integer
    required:
    - id
    type: object
  dtos.UpdateDepartmentDto:
    properties:
      description:
        maxLength: 255
        type: string
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - id
    - name
    type: object
  dtos.UpdateWorkerDto:
    properties:
      department_id:
        type: integer
      email:
        type: string
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - email
    - id
    - name
    type: object
  pagination.PaginationResponse:
    properties:
      data: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  report.WorkerAttendanceReport:
    properties:
      attendanceRate:
        type: number
      daysAbsent:
        type: integer
      daysPresent:
        type: integer
      department:
        type: string
      hoursWorked:
        type: number
      workerId:
        type: integer
      workerName:
        type: string
    type: object
  workers.Worker:
    properties:
      department:
        $ref: '#/definitions/departments.Department'
      department_id:
        type: integer
      email:
        type: string
      hire_date:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      salary:
        type: number
    type: object
info:
  contact: {}
paths:
  /:
    get:
      description: Returns service status
      produces:
      - application/json
      responses:
        "200":
          description: We are up!
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /attendances:
    get:
      description: Get attendances with optional pagination query parameters
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginationResponse'
      security:
      - BearerAuth: []
      summary: List attendances (paginated)
      tags:
      - attendances
  /attendances/{id}:
    get:
      description: Get an attendance record by its ID
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/attendance.Attendance'
      security:
      - BearerAuth: []
      summary: Get an attendance record by ID
      tags:
      - attendances
  /attendances/checkin:
    post:
      consumes:
      - application/json
      description: Create a new attendance record for a worker
      parameters:
      - description: Attendance payload
        in: body
        name: attendance
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateAttendanceDto'
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Create an attendance record
      tags:
      - attendances
  /attendances/checkout:
    put:
      consumes:
      - application/json
      description: Update the check-out time of an existing attendance record
      parameters:
      - description: Attendance ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated attendance payload
        in: body
        name: attendance
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateAttendanceDto'
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Update an attendance record
      tags:
      - attendances
  /attendances/worker/{worker_id}:
    get:
      description: Get all attendance records for a specific worker
      parameters:
      - description: Worker ID
        in: path
        name: worker_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/attendance.Attendance'
            type: array
      security:
      - BearerAuth: []
      summary: Get attendance records by worker ID
      tags:
      - attendances
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/auth.LoginDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.APIError'
      summary: Login a user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      summary: Register a new user
      tags:
      - auth
  /departments:
    get:
      description: Get departments with optional pagination query parameters
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginationResponse'
      security:
      - BearerAuth: []
      summary: List departments (paginated)
      tags:
      - departments
    post:
      consumes:
      - application/json
      description: Create a new department
      parameters:
      - description: Department payload
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateDepartmentDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.CreateDepartmentDto'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      security:
      - BearerAuth: []
      summary: Create a department
      tags:
      - departments
    put:
      consumes:
      - application/json
      description: Update an existing department
      parameters:
      - description: Department payload
        in: body
        name: department
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateDepartmentDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.UpdateDepartmentDto'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      security:
      - BearerAuth: []
      summary: Update a department
      tags:
      - departments
  /departments/{id}:
    delete:
      description: Delete a department by ID
      responses: {}
      security:
      - BearerAuth: []
      summary: Delete a department
      tags:
      - departments
    get:
      description: Get a department by ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/departments.Department'
      security:
      - BearerAuth: []
      summary: Get a department
      tags:
      - departments
  /payroll/:workerId:
    get:
      description: Get payrolls by worker ID
      parameters:
      - description: Worker ID
        in: path
        name: workerId
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get payrolls for a worker
      tags:
      - payrolls
  /payroll/calculate:
    post:
      consumes:
      - application/json
      description: Calculate net salary for a payroll payload
      parameters:
      - description: Payroll payload
        in: body
        name: payroll
        required: true
        schema:
          $ref: '#/definitions/dtos.CreatePayrollDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      security:
      - BearerAuth: []
      summary: Calculate payroll
      tags:
      - payrolls
  /payrolls:
    get:
      description: Get payrolls with optional pagination query parameters
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginationResponse'
      security:
      - BearerAuth: []
      summary: List payrolls (paginated)
      tags:
      - payrolls
  /reports/workers/attendance:
    get:
      description: Get aggregated attendance data for workers within a date range
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        required: true
        type: string
      - description: Filter by department ID
        in: query
        name: department_id
        type: integer
      - description: Filter by worker ID
        in: query
        name: worker_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/report.WorkerAttendanceReport'
            type: array
      security:
      - BearerAuth: []
      summary: Get worker attendance report
      tags:
      - reports
  /workers:
    get:
      description: Get workers with optional pagination query parameters
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pagination.PaginationResponse'
      security:
      - BearerAuth: []
      summary: List workers (paginated)
      tags:
      - workers
    post:
      consumes:
      - application/json
      description: Create a new worker
      parameters:
      - description: Worker payload
        in: body
        name: worker
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateWorkerDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.CreateWorkerDto'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      security:
      - BearerAuth: []
      summary: Create a worker
      tags:
      - workers
    put:
      consumes:
      - application/json
      description: Update an existing worker
      parameters:
      - description: Worker payload
        in: body
        name: worker
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateWorkerDto'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.UpdateWorkerDto'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.APIError'
      security:
      - BearerAuth: []
      summary: Update a worker
      tags:
      - workers
  /workers/{id}:
    delete:
      description: Delete a worker by ID
      responses: {}
      security:
      - BearerAuth: []
      summary: Delete a worker
      tags:
      - workers
    get:
      description: Get a worker by ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workers.Worker'
      security:
      - BearerAuth: []
      summary: Get a worker
      tags:
      - workers
swagger: "2.0"
